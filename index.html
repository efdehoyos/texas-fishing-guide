}
function AIChatTab(){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [searchStatus,setSearchStatus]=useState("");
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [keyInput,setKeyInput]=useState("");
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages,loading]);
  const STARTERS=["Best freshwater day trip from SA this weekend? Check levels.","What is the barometric pressure - good weekend to fish?","What lure color for murky bay water in fall?","How deep should I fish for bass in Texas summer?","How do I read an eddy on the Guadalupe River?","What clothing for clear flats fishing at Laguna Madre?","When should I use a Palomar vs Non-Slip Loop knot?","Should I fish before a storm or wait for it to clear?"];
  async function send(text){
    const msg=(text||input).trim();
    if(!msg||loading)return;
    setInput("");
    const updated=[...messages,{role:"user",content:msg}];
    setMessages(updated);
    setLoading(true);
    setSearchStatus("🔍 Checking lake levels, barometric pressure & conditions...");
    const _apiKey = sessionStorage.getItem("tex_api_key");
    if(!_apiKey){
      setMessages([...updated,{role:"assistant",content:"⚠️ API key required to use Ask Tex on this standalone version.\n\nGet a free API key at console.anthropic.com, then click the 🔑 button above to enter it. It is stored only in your browser session."}]);
      setLoading(false); setSearchStatus(""); return;
    }
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},headers:{"Content-Type":"application/json","x-api-key":sessionStorage.getItem("tex_api_key")||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:AI_SYSTEM_PROMPT,tools:[{type:"web_search_20250305",name:"web_search"}],messages:updated})});
      const data=await res.json();
      const didSearch=data?.content?.some(b=>b.type==="tool_use"&&b.name==="web_search");
      setSearchStatus(didSearch?"✅ Live conditions verified":"");
      const reply=data?.content?.find(b=>b.type==="text")?.text||"Couldn't get a response - try again.";
      setMessages([...updated,{role:"assistant",content:reply}]);
    }catch{
      setMessages([...updated,{role:"assistant",content:"Connection issue. Check your network and try again."}]);
      setSearchStatus("");
    }finally{
      setLoading(false);
      setTimeout(()=>setSearchStatus(""),5000);
    }
  }
  return (
    <div style={{display:"flex",flexDirection:"column"}}>
      <div style={{background:C.accentBg,border:`1.5px solid ${C.accentBd}`,borderRadius:12,padding:"16px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:"#fff",border:`2px solid ${C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.6rem",flexShrink:0}}>🤠</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",fontWeight:700,color:C.text}}>Ask Tex</div>
          <div style={{fontSize:"0.82rem",color:C.textMid,marginTop:3,lineHeight:1.6}}>Your Texas fishing guide - fresh and saltwater, live conditions, color science, thermoclines, barometric pressure, structure, knots, and more.</div>
          <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap"}}>
            {["🔍 Live Levels","🌬️ Barometric","🎨 Color Science","🌡️ Thermocline","🪢 Knots","🏖️ Structure","🌊 Current","👕 Clothing"].map(b=>(
              <span key={b} style={{fontSize:"0.7rem",color:C.textMid,background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:"2px 7px"}}>{b}</span>
            ))}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:C.green,boxShadow:`0 0 6px ${C.green}`}}/>
          <span style={{fontSize:"0.65rem",color:C.green,letterSpacing:"0.05em",fontWeight:700}}>LIVE</span>
        </div>
      </div>

    {showKeyInput && (
      <div style={{background:"#fef3e2",border:"1.5px solid #f5c97a",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <input value={keyInput} onChange={e=>setKeyInput(e.target.value)}
          placeholder="Paste your Anthropic API key (sk-ant-...)"
          type="password"
          style={{flex:1,minWidth:200,border:"1px solid #ddd5c8",borderRadius:8,padding:"8px 12px",fontSize:"0.82rem",fontFamily:"monospace",outline:"none",background:"#fff"}}
        />
        <button onClick={()=>{if(keyInput.trim()){sessionStorage.setItem("tex_api_key",keyInput.trim());setShowKeyInput(false);setKeyInput("");}}}
          style={{background:"#b05e0d",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:"0.85rem",fontWeight:700}}>Save</button>
        <button onClick={()=>{sessionStorage.removeItem("tex_api_key");setShowKeyInput(false);setKeyInput("");}}
          style={{background:"#fceae7",color:"#b5230a",border:"1px solid #f0a898",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:"0.85rem"}}>Clear</button>
      </div>
    )}
    {!showKeyInput && !sessionStorage.getItem("tex_api_key") && (
      <div style={{background:"#fceae7",border:"1px solid #f0a898",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>

          <span style={{fontSize:"0.78rem",color:"#5a4e40"}}>Get one at <a href="https://console.anthropic.com" target="_blank" rel="noopener" style={{color:"#b05e0d"}}>console.anthropic.com</a> → API Keys → Create Key. Stored only in your browser session.</span>
        </div>
        <button onClick={()=>setShowKeyInput(true)} style={{background:"#b05e0d",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:"0.85rem",fontWeight:700,whiteSpace:"nowrap"}}>Add API Key</button>
      </div>
    )}
    {!showKeyInput && sessionStorage.getItem("tex_api_key") && (
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}>
        <button onClick={()=>setShowKeyInput(true)} style={{background:"none",border:"none",color:"#8a7b6a",fontSize:"0.75rem",cursor:"pointer"}}>🔑 API key active (change)</button>
      </div>
    )}
      {messages.length===0&&(
        <div style={{marginBottom:18}}>
          <div style={{fontSize:"0.72rem",color:C.textSoft,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10,fontWeight:700}}>Ask Tex anything:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {STARTERS.map(s=>(
              <button key={s} onClick={()=>send(s)} style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:20,padding:"8px 14px",fontSize:"0.82rem",color:C.textMid,cursor:"pointer",lineHeight:1.4,transition:"all 0.18s",fontFamily:"inherit"}}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14,maxHeight:440,overflowY:"auto",paddingRight:4}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-start",gap:10}}>
            {m.role==="assistant"&&<div style={{width:36,height:36,borderRadius:"50%",background:C.accentBg,border:`1.5px solid ${C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0,marginTop:2}}>🤠</div>}
            <div style={{maxWidth:"82%",background:m.role==="user"?C.blueBg:C.bgCard,border:`1px solid ${m.role==="user"?C.blueBd:C.border}`,borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",padding:"11px 15px",fontSize:"0.9rem",color:C.text,lineHeight:1.75,whiteSpace:"pre-wrap",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>{m.content}</div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {searchStatus&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",background:C.greenBg,border:`1px solid ${C.greenBd}`,borderRadius:20,alignSelf:"flex-start",marginLeft:46}}>

            <div style={{display:"flex",alignItems:"center",gap:10}}>

              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask Tex - live lake levels, barometric pressure, color science, knots, structure..." rows={2} style={{flex:1,background:C.bgCard,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:"0.9rem",resize:"none",fontFamily:"'Source Serif 4',Georgia,serif",outline:"none",lineHeight:1.5}}/>

      </div>
      {messages.length>0&&<button onClick={()=>{setMessages([]);setSearchStatus("");}} style={{background:"none",border:"none",color:C.textSoft,fontSize:"0.78rem",cursor:"pointer",marginTop:10,textAlign:"center",fontFamily:"inherit"}}>↺ Start new conversation</button>}
